<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=0.5, maximum-scale=0.5, user-scalable=no">
    <title>STM32 Code Tool</title>
    <link rel="stylesheet" href="./styles.css"/>
    <script src="./script.js" type="module"></script>
</head>

<body>

    <div class="tab-bar">
        <button class="tab-btn">C Code Tool</button>
    </div>
    <div class="tab-bar">
        <button class="tab-btn" id="clock">clock</button>
        <button class="tab-btn" id="ioport">ioport</button>
    </div>
    <div class="modules">
        <div class="containerModule" id="module-container-id">
        </div>

        <div class="generate-container" id="generate-container-id">
            <div class="code-container" id="code-container-id">
                <button class="copy-btn">Copy</button>
                <button class="generate-btn">Generate</button>
                <pre>
                    <code id="code-block">
                        <span class="code-line">!!please Press Generate Code </span>
                    </code>
                </pre>
            </div>
            <div  class="config-container" id="config-container-id">
                <pre>
                    <code id="config-block">
                        <span class="config-line">!!please Press Generate Code </span>
                    </code>
                </pre>
            </div>  
        </div>
    </div>
    <div class="bottom-scrollbar" id="bottom-scrollbar-id" aria-hidden="true">
        <div class="bottom-scrollbar-inner" id="bottom-scrollbar-inner-id"></div>
    </div>
</body>
</html>
